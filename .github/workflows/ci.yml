name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
      - run: uv sync --frozen
      - run: uv run ruff check app tests
      - run: uv run mypy app
      - run: uv run pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
      - run: uv sync --frozen
      - name: pip-audit (dependency CVEs)
        run: uv run --with pip-audit pip-audit -r requirements.txt
      - name: bandit (SAST)
        run: uv run --with bandit bandit -q -r app
